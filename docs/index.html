<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<style>
.stat-card {
    padding: 1.5rem 1rem;
}
.stat-label {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6b7280;
    margin-bottom: 0.75rem;
}
.stat-value {
    font-size: 1.875rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
}
</style>

    <style>
        
        body { visibility: visible; }
        
    </style>
    
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="firebase-auth.js"></script>
    <script type="module" src="firestore-data.js"></script>
    
    <link href="static/css/styles.css?v=1775184918" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid px-3 px-lg-4">
            <span class="navbar-brand">
                <i class="fas fa-chart-line me-2"></i>TCG Tracker
            </span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" 
                           href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " 
                           href="transactions.html">Transactions</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <div id="userInfo" style="display:none;" class="d-flex align-items-center gap-2">
                            <small id="userEmail" class="text-muted"></small>
                            <button id="logoutBtn" class="btn btn-sm btn-outline-secondary">
                                <i class="fas fa-sign-out-alt me-1"></i>Logout
                            </button>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-2 px-md-3 px-lg-4 mt-3">
        

        
<!-- Summary Stat Cards -->
<div class="row mb-4 g-3">
    <div class="col-6 col-md-4">
        <div class="card h-100">
            <div class="card-body text-center stat-card">
                <div class="stat-label">Current Value</div>
                
                <div class="stat-value text-success" id="stat-total-value">—</div>
                
            </div>
        </div>
    </div>
    <div class="col-6 col-md-4">
        <div class="card h-100">
            <div class="card-body text-center stat-card">
                <div class="stat-label">Cost Basis</div>
                
                <div class="stat-value" style="color:#ef4444" id="stat-cost-basis">—</div>
                
            </div>
        </div>
    </div>
    <div class="col-6 col-md-4">
        <div class="card h-100">
            <div class="card-body text-center stat-card">
                <div class="stat-label">Return %</div>
                
                <div class="stat-value" id="stat-return-pct">—</div>
                
            </div>
        </div>
    </div>
</div>

<!-- Portfolio Chart -->
<div class="row mb-4">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div id="portfolioChart" style="height: 400px;"></div>
            </div>
        </div>
    </div>
</div>

<!--  Holdings Table -->
<div class="row">
    <div class="col-12">
        <div class="table-section">
            <div class="table-header d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Current Holdings</h5>
                
                <span class="badge bg-success fs-6" id="holdings-count">...</span>
                
            </div>
            <div class="table-content">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th style="width: 50px;" class="no-sort"></th>
                                <th>Product Name</th>
                                <th class="text-end">Qty</th>
                                <th class="text-end">Avg Buy</th>
                                <th class="text-end">Latest Price</th>
                                <th class="text-end">Gain %</th>
                                <th class="text-end">1-Week Change</th>
                                <th class="text-end">Total Value</th>
                            </tr>
                        </thead>
                        <tbody id="holdings-body">
                            
                            <tr><td colspan="5" class="text-center py-4 text-muted">Loading...</td></tr>
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="dashboard.js"></script>

<script src="static/js/table-init.js"></script>

</body>
</html>
