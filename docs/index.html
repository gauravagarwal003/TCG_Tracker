    <div class="container-fluid px-2 px-md-3 px-lg-4 mt-3">
        

        
<!-- Summary Stat Cards -->
<div class="row mb-3 g-2">
    <div class="col-6 col-md-4">
        <div class="card h-100">
            <div class="card-body text-center py-3">
                <div class="text-muted small mb-1">Current Value</div>
                
                <div class="fs-4 fw-bold text-success" id="stat-total-value">—</div>
                
            </div>
        </div>
    </div>
    <div class="col-6 col-md-4">
        <div class="card h-100">
            <div class="card-body text-center py-3">
                <div class="text-muted small mb-1">Cost Basis</div>
                
                <div class="fs-4 fw-bold" style="color:#ef4444" id="stat-cost-basis">—</div>
                
            </div>
        </div>
    </div>
    <div class="col-6 col-md-4">
        <div class="card h-100">
            <div class="card-body text-center py-3">
                <div class="text-muted small mb-1">Return</div>
                
                <div class="fs-4 fw-bold" id="stat-return-pct">—</div>
                
            </div>
        </div>
    </div>
</div>

<!-- Portfolio Chart -->
<div class="row mb-4">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div id="portfolioChart" style="height: 400px;"></div>
            </div>
        </div>
    </div>
</div>

<!--  Holdings Table -->
<div class="row">
    <div class="col-12">
        <div class="table-section">
            <div class="table-header d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Current Holdings</h5>
                
                <span class="badge bg-success fs-6" id="holdings-count">...</span>
                
            </div>
            <div class="table-content">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th style="width: 50px;" class="no-sort"></th>
                                <th>Product Name</th>
                                <th class="text-end">Qty</th>
                                <th class="text-end">Avg Buy</th>
                                <th class="text-end">Latest Price</th>
                                <th class="text-end">Gain %</th>
                                <th class="text-end">±/Unit</th>
                                <th class="text-end">Total Value</th>
                            </tr>
                        </thead>
                        <tbody id="holdings-body">
                            
                            <tr><td colspan="5" class="text-center py-4 text-muted">Loading...</td></tr>
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    

<script>
// Dynamically load holdings and summary from data/ JSON files so the page
// always reflects the latest data committed by GitHub Actions without
// requiring Flask to re-render the HTML template.
function escapeHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

const fmtUSD = v => '$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

Promise.all([
    fetch('data/daily_summary.json?cb=' + Date.now()).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
    fetch('data/holdings.json?cb='      + Date.now()).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
]).then(([summary, holdings]) => {

    // --- Stat cards ---
    const latestDate = Object.keys(summary).sort().pop();
    const latestVal  = latestDate ? summary[latestDate].total_value : 0;
    const latestCost = latestDate ? summary[latestDate].cost_basis  : 0;
    const gainLoss   = latestVal - latestCost;
    const returnPct  = latestCost > 0 ? (gainLoss / latestCost) * 100 : 0;
    const glColour   = gainLoss >= 0 ? '#10b981' : '#ef4444';

    document.getElementById('stat-total-value').textContent = fmtUSD(latestVal);
    document.getElementById('stat-cost-basis').textContent  = fmtUSD(latestCost);

    const retEl = document.getElementById('stat-return-pct');
    retEl.textContent = (returnPct >= 0 ? '+' : '') + returnPct.toFixed(1) + '%';
    retEl.style.color = glColour;

    // --- Holdings table ---
    // Sort by latest_price descending
    holdings.sort((a, b) => b.latest_price - a.latest_price);

    const tbody      = document.getElementById('holdings-body');
    const countBadge = document.getElementById('holdings-count');
    if (!holdings || holdings.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">No holdings.</td></tr>';
    } else {
        tbody.innerHTML = holdings.map(item => {
            const thumb = item.imageUrl
                ? `<img src="${escapeHtml(item.imageUrl)}" alt="" class="product-thumb">`
                : '<div class="product-thumb-placeholder"></div>';
            const name = item.url
                ? `<a href="${escapeHtml(item.url)}" target="_blank" class="text-decoration-none">${escapeHtml(item.name)}</a>`
                : escapeHtml(item.name);
            const avgBuy = item.avg_buy_price != null ? `$${item.avg_buy_price.toFixed(2)}` : '—';
            // Gain % column
            let gainPctHtml = '—';
            if (item.avg_buy_price != null && item.avg_buy_price > 0) {
                const pct = (item.latest_price - item.avg_buy_price) / item.avg_buy_price * 100;
                const glColor = pct >= 0 ? '#10b981' : '#ef4444';
                gainPctHtml = `<span style="color:${glColor}">${pct >= 0 ? '+' : '-'}${Math.abs(pct).toFixed(1)}%</span>`;
            }
            // ±/Unit absolute $ column
            let unitAbsHtml = '—';
            if (item.avg_buy_price != null) {
                const gl = item.latest_price - item.avg_buy_price;
                const glColor = gl >= 0 ? '#10b981' : '#ef4444';
                unitAbsHtml = `<span style="color:${glColor}">${gl >= 0 ? '+' : '-'}$${Math.abs(gl).toFixed(2)}</span>`;
            }
            return `<tr>
                <td>${thumb}</td>
                <td class="fw-medium">${name}</td>
                <td class="text-end">${Math.round(item.quantity)}</td>
                <td class="text-end">${avgBuy}</td>
                <td class="text-end">$${item.latest_price.toFixed(2)}</td>
                <td class="text-end">${gainPctHtml}</td>
                <td class="text-end">${unitAbsHtml}</td>
                <td class="text-end fw-bold">$${item.total_value.toFixed(2)}</td>
            </tr>`;
        }).join('');
        countBadge.textContent = holdings.length + ' items';
    }

    // --- Portfolio chart ---
    const dates     = Object.keys(summary).sort();
    const values    = dates.map(d => summary[d].total_value);
    const costBasis = dates.map(d => summary[d].cost_basis);

    Plotly.newPlot('portfolioChart', [
        {
            x: dates, y: values,
            type: 'scatter', mode: 'lines', name: 'Total Value',
            line: { color: '#10b981', width: 2 },
            fill: 'tozeroy', fillcolor: 'rgba(16, 185, 129, 0.12)'
        },
        {
            x: dates, y: costBasis,
            type: 'scatter', mode: 'lines', name: 'Cost Basis',
            line: { color: '#ef4444', width: 2, dash: 'dot' }
        }
    ], {
        margin: { t: 30, r: 20, b: 40, l: 60 },
        xaxis: { title: '', color: '#94a3b8', gridcolor: '#334155', linecolor: '#334155' },
        yaxis: { title: '', tickprefix: '$', color: '#94a3b8', gridcolor: '#334155', linecolor: '#334155' },
        legend: { x: 0.02, y: 0.98, font: { color: '#e2e8f0' } },
        hovermode: 'x unified',
        hoverlabel: { bgcolor: '#0f1114', bordercolor: '#222222', font: { color: '#e6eef8', size: 12 } },
        plot_bgcolor: 'rgba(0,0,0,0)',
        paper_bgcolor: 'rgba(0,0,0,0)',
        font: { color: '#e2e8f0' }
    }, { responsive: true });

}).catch(err => {
    console.error('Failed to load dashboard data:', err);
    const tbody = document.getElementById('holdings-body');
    if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-danger">Failed to load holdings data.</td></tr>';
});
</script>

<script src="static/js/table-init.js"></script>

</body>
</html>
