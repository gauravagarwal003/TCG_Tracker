name: Rebuild Docs on Code Change

# Fires when you push changes to templates, static assets, or Python source.
# Does a docs-only rebuild (no price fetching) so GitHub Pages reflects
# the latest layout/style/logic changes immediately after a commit.
# Skips bot commits to avoid loops.

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'static/**'
      - 'app.py'
      - 'engine.py'
      - 'daily_run.py'
      - 'transaction_manager.py'
      - 'price_fetcher.py'
      - 'requirements.txt'

permissions:
  contents: write

concurrency:
  group: code-rebuild
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Pull latest changes
      run: git pull --rebase origin main || true

    - name: Rebuild docs from existing data (no price fetch)
      run: python daily_run.py --docs-only

    - name: Commit and push rebuilt docs
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add docs/
        git diff --staged --quiet || git commit -m "Rebuild docs after code change [skip ci]"
        git push origin main || {
          echo "Push failed, retrying with rebase..."
          git pull --rebase origin main
          git push origin main
        }
