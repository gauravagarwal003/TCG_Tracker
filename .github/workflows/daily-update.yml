name: Daily Price Update

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
  # push trigger removed to avoid running daily price update on transaction edits

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      PUBLISH_PUBLIC_WIDGET_DATA: ${{ secrets.PUBLISH_PUBLIC_WIDGET_DATA }}
      WIDGET_PRIVATE_REPO: ${{ secrets.WIDGET_PRIVATE_REPO }}
      WIDGET_PRIVATE_REPO_TOKEN: ${{ secrets.WIDGET_PRIVATE_REPO_TOKEN }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        sudo apt-get install -y p7zip-full
    
    - name: Pull latest changes
      run: git pull --rebase origin main || true
    
    - name: Run daily update
      run: |
        if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
          echo "Firebase credentials detected: running Firestore-backed price update"
          python daily_run.py --firebase-union
        else
          echo "No Firebase credentials: running legacy local mode"
          python daily_run.py
        fi

    - name: Publish private widget repo
      run: python scripts/publish_widget_private_repo.py
    
    - name: Commit and push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A
        git diff --staged --quiet || git commit -m "Daily price update $(date -u +'%Y-%m-%d') [skip ci]"
        git push origin main || {
          echo "Push failed, retrying with rebase..."
          git pull --rebase origin main
          git push origin main
        }
