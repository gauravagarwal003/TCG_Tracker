name: Daily Price Update

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
  # push trigger removed to avoid running daily price update on transaction edits

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        sudo apt-get install -y p7zip-full
    
    - name: Pull latest changes
      run: git pull --rebase origin main || true
    
    - name: Run daily update
      run: |
        if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
          echo "Firebase credentials detected: running union fetch mode"
          python daily_run.py --firebase-union
        else
          echo "No Firebase credentials: running legacy local mode"
          python daily_run.py
        fi
    
    - name: Commit and push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A
        git diff --staged --quiet || git commit -m "Daily price update $(date -u +'%Y-%m-%d') [skip ci]"
        git push origin main || {
          echo "Push failed, retrying with rebase..."
          git pull --rebase origin main
          git push origin main
        }

    - name: Set up Node.js (for Firebase CLI)
      if: ${{ env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_TOKEN != '' }}
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Firebase CLI
      if: ${{ env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_TOKEN != '' }}
      run: npm install -g firebase-tools

    - name: Deploy to Firebase Hosting
      if: ${{ env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_TOKEN != '' }}
      run: |
        echo "Deploying docs/ to Firebase Hosting project: $FIREBASE_PROJECT_ID"
        firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN" --non-interactive

    - name: Skip Firebase Hosting deploy (missing secrets)
      if: ${{ env.FIREBASE_PROJECT_ID == '' || env.FIREBASE_TOKEN == '' }}
      run: |
        echo "FIREBASE_PROJECT_ID or FIREBASE_TOKEN not set; skipping Firebase Hosting deploy."
