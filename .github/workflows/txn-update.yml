name: Rebuild on Data Change

# Fires when transactions or product mappings are pushed directly to main.
# This covers: add/edit/delete transaction, add/edit product.
# The [skip ci] suffix on bot commits prevents an infinite rebuild loop.

on:
  push:
    branches: [main]
    paths:
      - 'transactions.json'
      - 'mappings.json'

permissions:
  contents: write

concurrency:
  group: data-rebuild
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Skip commits that the bot itself made to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        sudo apt-get install -y p7zip-full

    - name: Pull latest changes
      run: git pull --rebase origin main || true

    - name: Fetch missing prices then rebuild docs
      run: |
        python - <<'PY'
        from engine import load_transactions, derive_daily_summary, save_daily_summary
        from price_fetcher import update_prices
        import daily_run

        tx = load_transactions()
        if not tx:
            print('No transactions found; nothing to rebuild.')
        else:
            print(f'Fetching any missing prices for {len(tx)} transactions...')
            update_prices()  # only fetches dates/products that have no price yet
            print(f'Re-deriving summary...')
            s = derive_daily_summary(tx)
            save_daily_summary(s)
            print('Generating static site assets...')
            daily_run.generate_static_site(tx, s)
        PY

    - name: Commit and push rebuilt docs
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add docs/ daily_summary.json prices/
        git diff --staged --quiet || git commit -m "Rebuild docs after data change [skip ci]"
        git push origin main || {
          echo "Push failed, retrying with rebase..."
          git pull --rebase origin main
          git push origin main
        }
